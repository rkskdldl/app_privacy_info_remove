<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계정 삭제 요청</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
        }
        .container {
            background: #fff;
            padding: 20px;
            margin: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .app-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .app-header img {
            width: 40px;
            height: 40px;
            margin-right: 10px;
        }
        .app-header h1 {
            font-size: 18px;
            margin: 0;
        }
        form {
            margin-top: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            text-align: left;
            font-weight: bold;
            font-size: 14px;
        }
        input[type="text"], input[type="tel"], input[type="email"], select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .checkbox-group {
            text-align: left;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .checkbox-group input {
            margin-right: 8px;
        }
        .checkbox-group label {
            margin-bottom: 0;
            font-weight: normal;
        }
        button {
            background-color: #ff4d4d;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            background-color: #e60000;
        }
        /* 초기에는 숨김 처리 */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-header">
            <img src="gnv_app_icon.png" alt="App Icon">
            <h1 id="appTitle">GINOVO - 스마트 퍼팅 솔루션</h1>
        </div>
        
        <form id="deleteForm">
            <div id="phoneSection">
                <label for="phone">휴대폰 번호</label>
                <input type="tel" id="phone" name="phone" placeholder="010-1234-5678">
            </div>

            <div id="ginovo3dSection" class="hidden">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="email" placeholder="example@email.com">
                
                <label for="socialType">소셜 로그인 타입</label>
                <select id="socialType" name="socialType">
                    <option value="">선택해주세요</option>
                    <option value="구글">구글 로그인</option>
                    <option value="애플">애플 로그인</option>
                    <option value="카카오">카카오 로그인</option>
                    <option value="네이버">네이버 로그인</option>
                    <option value="라인">라인 로그인</option>
                </select>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="agree" name="agree">
                <label for="agree">개인정보 및 계정 삭제에 동의합니다.</label>
            </div>
            
            <button type="submit">계정 삭제 요청</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
